<!DOCTYPE html>
<html>
<head>
  <title>Connection Test</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .result { padding: 12px 16px; border-radius: 8px; margin: 8px 0; font-size: 14px; }
    .ok   { background: #d1fae5; color: #065f46; }
    .fail { background: #fee2e2; color: #991b1b; }
    .info { background: #dbeafe; color: #1e40af; }
    button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 4px; }
    input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin: 4px 0 12px; box-sizing: border-box; }
    label { font-size: 13px; font-weight: 500; color: #374151; }
    h2 { margin-top: 24px; font-size: 16px; }
    pre { background: #f3f4f6; padding: 12px; border-radius: 8px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>🔧 Q-Predictor Connection Test</h1>
  <p style="color:#666;font-size:14px">Open this file from <code>http://localhost:3000/test_connection.html</code> — not from file://</p>

  <h2>Step 1 — Test backend health</h2>
  <button onclick="testHealth()">Test Backend (port 8000)</button>
  <div id="health-result"></div>

  <h2>Step 2 — Test login directly</h2>
  <label>Email</label>
  <input id="email" type="email" placeholder="your@email.com" />
  <label>Password</label>
  <input id="password" type="password" placeholder="yourpassword" />
  <button onclick="testLogin()">Test Login</button>
  <div id="login-result"></div>

  <h2>Step 3 — Check saved token</h2>
  <button onclick="checkToken()">Check localStorage Token</button>
  <div id="token-result"></div>

  <h2>Step 4 — Test /me with token</h2>
  <button onclick="testMe()">Test /me endpoint</button>
  <div id="me-result"></div>

  <div id="log" style="margin-top:24px"></div>

  <script>
    function show(id, msg, type) {
      document.getElementById(id).innerHTML = `<div class="result ${type}">${msg}</div>`
    }
    function log(msg) {
      document.getElementById('log').innerHTML += `<pre>${msg}</pre>`
    }

    async function testHealth() {
      try {
        const r = await fetch('http://127.0.0.1:8000/api/health')
        const d = await r.json()
        show('health-result', '✅ Backend reachable: ' + JSON.stringify(d), 'ok')
      } catch(e) {
        show('health-result', '❌ Cannot reach backend: ' + e.message + '<br><br>Make sure uvicorn is running: <code>uvicorn app.main:app --reload</code>', 'fail')
      }
    }

    async function testLogin() {
      const email = document.getElementById('email').value
      const pass  = document.getElementById('password').value
      if (!email || !pass) { show('login-result', '⚠️ Enter email and password first', 'info'); return }

      try {
        const form = new URLSearchParams({ username: email, password: pass })
        const r = await fetch('http://127.0.0.1:8000/api/auth/login', {
          method: 'POST',
          body: form
        })
        const d = await r.json()
        log('Login response (' + r.status + '):\n' + JSON.stringify(d, null, 2))

        if (r.ok && d.access_token) {
          localStorage.setItem('token', d.access_token)
          show('login-result', '✅ Login successful! Token saved to localStorage.<br>Token starts with: ' + d.access_token.substring(0, 30) + '...', 'ok')
        } else {
          show('login-result', '❌ Login failed: ' + JSON.stringify(d), 'fail')
        }
      } catch(e) {
        show('login-result', '❌ Request failed: ' + e.message, 'fail')
      }
    }

    function checkToken() {
      const token = localStorage.getItem('token')
      if (token) {
        show('token-result', '✅ Token found in localStorage:<br><small>' + token.substring(0, 50) + '...</small>', 'ok')
      } else {
        show('token-result', '❌ No token in localStorage. Login first.', 'fail')
      }
    }

    async function testMe() {
      const token = localStorage.getItem('token')
      if (!token) { show('me-result', '❌ No token. Login first.', 'fail'); return }

      try {
        const r = await fetch('http://127.0.0.1:8000/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        })
        const d = await r.json()
        log('/me response (' + r.status + '):\n' + JSON.stringify(d, null, 2))

        if (r.ok) {
          show('me-result', '✅ Authenticated as: <b>' + d.name + '</b> (' + d.email + ')', 'ok')
        } else {
          show('me-result', '❌ Auth failed: ' + JSON.stringify(d), 'fail')
        }
      } catch(e) {
        show('me-result', '❌ Request failed: ' + e.message, 'fail')
      }
    }
  </script>
</body>
</html>
