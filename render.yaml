# render.yaml — Render Blueprint
# Defines both the backend web service and the PostgreSQL database.
# When you connect your GitHub repo to Render, it reads this file
# and sets up everything automatically.

services:
  - type: web
    name: qpredictor-backend
    runtime: python
    region: singapore          # closest to India
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qpredictor-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true    # Render auto-generates a secure random value
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: STORAGE_DIR
        value: "storage/papers"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: qpredictor-db
    plan: free
    region: singapore
